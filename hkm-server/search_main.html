<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SITES LIST</title>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --accent-white: #ffffff;
            --card-bg: #111111;
            --text-muted: #333333;
        }
        body {
            background-color: var(--bg-color);
            color: var(--accent-white);
            font-family: 'Inter', -apple-system, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            padding: 100px 20px;
        }
        .main-frame {
            width: 100%;
            max-width: 800px;
            border: 1px solid var(--accent-white);
            padding: 40px;
            box-sizing: border-box;
        }
        header {
            margin-bottom: 40px;
            border-bottom: 1px solid #222;
            padding-bottom: 15px;
        }
        h1 {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 5px;
            margin: 0;
            color: var(--text-muted);
        }
        
        .nav-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .nav-item {
            text-decoration: none;
            color: inherit;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px 25px;
            background: var(--card-bg);
            border: 1px solid #222;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .nav-item b {
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-weight: 400;
        }

        .nav-item::before {
            content: "[ " attr(data-id) " ]";
            font-size: 10px;
            color: var(--text-muted);
            margin-right: 20px;
        }

        .nav-item:hover {
            border-color: var(--accent-white);
            background: #1a1a1a;
            padding-left: 35px; 
	}

        .nav-item:hover b {
            color: var(--accent-white);
        }

        .nav-item::after {
            content: "->";
            font-size: 10px;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .nav-item:hover::after {
            opacity: 1;
        }

        ::-webkit-scrollbar { width: 2px; }
        ::-webkit-scrollbar-thumb { background: white; }
    </style>
</head>

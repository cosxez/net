<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>hkim</title>
    <style>
        :root {
            --bg-color: #050505;
            --accent-white: #ffffff;
            --card-bg: #111111;
            --text-muted: #777777;
            --border: 1px solid #222;
        }
        
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: var(--bg-color);
            color: var(--accent-white);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }

        .container {
            display: grid;
            grid-template-columns: 240px 1fr;
            grid-template-rows: 1fr 90px;
            height: 100vh;
        }

        aside {
            border-right: var(--border);
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 25px;
        }
        .logo { font-weight: 900; letter-spacing: 5px; font-size: 14px; margin-bottom: 20px; }
        nav a {
            display: block;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 15px;
            transition: 0.3s;
        }
        nav a:hover, nav a.active { color: white; }

        main {
            padding: 40px;
            overflow-y: auto;
            border-bottom: var(--border);
        }
        .section-title {
            font-size: 12px;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 30px;
            border-bottom: var(--border);
            padding-bottom: 10px;
        }

        .sfn-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 25px;
        }

        .track-card {
            background: var(--card-bg);
            border: 1px solid #222;
            padding: 15px;
            cursor: pointer;
            transition: 0.3s;
        }
        .track-card:hover { border-color: white; }
        
        .track-card img {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
            margin-bottom: 12px;
            transition: 0.5s;
        }
        .track-card:hover img { }

        .track-name { font-size: 11px; font-weight: bold; text-transform: uppercase; display: block; margin-bottom: 4px; }
        .artist-name { font-size: 10px; color: var(--text-muted); }

        footer {
            grid-column: span 2;
            display: grid;
            grid-template-columns: 30% 40% 30%;
            align-items: center;
            padding: 0 30px;
            background: #000;
            border-top: 1px solid white; 
        }

        .now-playing { display: flex; align-items: center; gap: 15px; }
        .now-playing img { width: 45px; height: 45px; border: 1px solid #333; }

        .player-controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }
        .btns { font-size: 18px; letter-spacing: 15px; cursor: pointer; user-select: none; }
        
        .progress-container {
            width: 100%;
            height: 2px;
            background: #222;
            cursor: pointer;
            position: relative;
        }
        #progress {
            width: 0%;
            height: 100%;
            background: white;
            transition: width 0.1s linear;
        }

        main::-webkit-scrollbar { width: 4px; }
        main::-webkit-scrollbar-thumb { background: white; }
    </style>
</head>
